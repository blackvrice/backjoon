services:
  postgres:
    image: postgres:17
    container_name: backjoon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: backjoon
      POSTGRES_PASSWORD: backjoon1234
      POSTGRES_DB: backjoon
    ports:
      - "5432:5432"
    volumes:
      - backjoon_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backjoon -d backjoon"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: backjoon-web
    container_name: backjoon-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://backjoon:backjoon1234@postgres:5432/backjoon?schema=public
    ports:
      - "3000:3000"

  judge:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: backjoon-judge
    container_name: backjoon-judge
    restart: unless-stopped
    user: root
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://backjoon:backjoon1234@postgres:5432/backjoon?schema=public
      DOCKER_HOST: unix:///var/run/docker.sock
      DOCKER_BIN: /usr/bin/docker
    command: npm run judge
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  lsp:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: backjoon-lsp
    container_name: backjoon-lsp
    restart: unless-stopped
    depends_on:
      - web
    environment:
      NODE_ENV: production
    command: npm run lsp
    ports:
      - "4001:4001"

volumes:
  backjoon_postgres_data:
